version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:22.12.0
    steps:
      - checkout
      - setup_remote_docker:
          version: default
      - run:
          name: Build Docker Image
          command: docker build -t portfolio-app .
      - run:
          name: Save Docker Image to Tar
          command: docker save -o portfolio-app.tar portfolio-app
      - persist_to_workspace:
          root: .
          paths:
            - portfolio-app.tar

  deploy:
    docker:
      - image: docker:24
    steps:
      - attach_workspace:
          at: /workspace
      - run:
          name: Copy Docker Image to Remote
          command: scp -oStrictHostKeyChecking=no /workspace/portfolio-app.tar $USER@$DNS:/home/ubuntu/
      - run:
          name: Load Docker Image on Remote
          command: ssh -oStrictHostKeyChecking=no $USER@$DNS "docker load -i /home/ubuntu/portfolio-app.tar"
      - run:
          name: Run Docker Container on Remote
          command: ssh -oStrictHostKeyChecking=no $USER@$DNS "docker stop portfolio-app || true && docker rm portfolio-app || true && docker run -d --name portfolio-app -p 80:80 portfolio-app"

workflows:
  build-deploy:
    jobs:
      - build
      - deploy:
          requires:
            - build